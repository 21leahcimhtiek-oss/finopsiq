name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
  SUPABASE_SERVICE_ROLE_KEY: placeholder-service-key
  STRIPE_SECRET_KEY: sk_test_placeholder
  STRIPE_WEBHOOK_SECRET: whsec_placeholder
  NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
  OPENAI_API_KEY: sk-placeholder
  UPSTASH_REDIS_REST_URL: https://placeholder.upstash.io
  UPSTASH_REDIS_REST_TOKEN: placeholder-token
  SENTRY_DSN: https://placeholder@o123.ingest.sentry.io/456
  NEXT_PUBLIC_SENTRY_DSN: https://placeholder@o123.ingest.sentry.io/456
  NEXT_PUBLIC_APP_URL: http://localhost:3000
  CRON_SECRET: test-cron-secret

jobs:
  ci:
    name: Type Check, Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test -- --passWithNoTests --forceExit

      - name: Build
        run: npm run build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build application
        run: npm run build

      - name: Run E2E tests
        run: npm run test:e2e